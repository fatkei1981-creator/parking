<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>粵語車牌語音核對系統 (日期審核)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .icon-box { min-width: 24px; min-height: 24px; display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQV-najIami6USTFBzxSpJ7jrxwRGoD4SdNimU4BgHjobS9GwYA-JlNXmVabaWVzBmRezYWrUDqYi4e/pub?output=csv";

        // 強化的圖標組件，解決一開始顯示不到的問題
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                const initIcon = () => {
                    if (window.lucide && iconRef.current) {
                        iconRef.current.innerHTML = `<i data-lucide="${name.toLowerCase()}" class="${className}" style="width:${size}px;height:${size}px"></i>`;
                        window.lucide.createIcons();
                    }
                };
                initIcon();
                // 額外延遲執行一次以防資源加載延遲
                const timer = setTimeout(initIcon, 300);
                return () => clearTimeout(timer);
            }, [name, size, className]);
            return <span ref={iconRef} className="icon-box"></span>;
        };

        function App() {
            const [plates, setPlates] = useState([]);
            const [isListening, setIsListening] = useState(false);
            const [transcript, setTranscript] = useState('');
            const [recognizedPlate, setRecognizedPlate] = useState('');
            const [matchData, setMatchData] = useState(null);
            const [error, setError] = useState('');
            const [isDbLoading, setIsDbLoading] = useState(false);

            const recognitionRef = useRef(null);
            const platesRef = useRef([]);
            const lastResultRef = useRef('');

            const strictNormalize = (text) => {
                if (!text) return '';
                return text.toString().replace(/\s+/g, '').replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '').toUpperCase().trim();
            };

            const convertChineseNumerals = (text) => {
                const map = { '零': '0', '一': '1', '二': '2', '三': '3', '四': '4', '五': '5', '六': '6', '七': '7', '八': '8', '九': '9' };
                return text.split('').map(char => map[char] || char).join('');
            };

            const fetchSheetData = async () => {
                setIsDbLoading(true);
                try {
                    const response = await fetch(`${SPREADSHEET_CSV_URL}&t=${Date.now()}`);
                    if (!response.ok) throw new Error("讀取試算表失敗");
                    const csvText = await response.text();
                    const rows = csvText.split(/\r?\n/).slice(1);
                    const parsedData = rows.map(row => {
                        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        return {
                            number: cols[0]?.replace(/"/g, '').trim() || '',
                            note: cols[1]?.replace(/"/g, '').trim() || '',
                            startDate: cols[2]?.replace(/"/g, '').trim() || '',
                            endDate: cols[3]?.replace(/"/g, '').trim() || ''
                        };
                    }).filter(item => item.number !== '');
                    setPlates(parsedData);
                    platesRef.current = parsedData;
                } catch (err) {
                    setError("資料同步錯誤: " + err.message);
                } finally {
                    setIsDbLoading(false);
                }
            };

            const checkDateValidity = (start, end) => {
                if (!start && !end) return { valid: true };
                const now = new Date();
                now.setHours(0, 0, 0, 0);
                
                if (start) {
                    const sDate = new Date(start);
                    if (!isNaN(sDate) && now < sDate) return { valid: false, reason: '未到生效期' };
                }
                if (end) {
                    const eDate = new Date(end);
                    if (!isNaN(eDate) && now > eDate) return { valid: false, reason: '許可已過期' };
                }
                return { valid: true };
            };

            const performCheck = (val) => {
                const target = strictNormalize(convertChineseNumerals(val));
                if (!target) return;
                setRecognizedPlate(target);
                const found = platesRef.current.find(p => strictNormalize(p.number) === target);
                
                if (found) {
                    const dateStatus = checkDateValidity(found.startDate, found.endDate);
                    setMatchData({ ...found, ...dateStatus });
                } else {
                    setMatchData(null);
                }
            };

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'zh-HK';
                    recognitionRef.current.onresult = (e) => {
                        let cur = '';
                        for (let i = e.resultIndex; i < e.results.length; ++i) cur += e.results[i][0].transcript;
                        setTranscript(cur);
                        lastResultRef.current = cur;
                        if (e.results[e.results.length - 1].isFinal || cur.length > 2) performCheck(cur);
                    };
                    recognitionRef.current.onend = () => setIsListening(false);
                    recognitionRef.current.onerror = (e) => { if (e.error !== 'aborted') setError(`語音錯誤: ${e.error}`); setIsListening(false); };
                }
                fetchSheetData();
            }, []);

            const handleStart = (e) => {
                if (e) e.preventDefault();
                setError(''); setTranscript(''); setRecognizedPlate(''); setMatchData(null);
                try { recognitionRef.current.start(); setIsListening(true); if (navigator.vibrate) navigator.vibrate(50); } catch(err){}
            };

            const handleEnd = (e) => {
                if (e) e.preventDefault();
                if (!isListening) return;
                setTimeout(() => { recognitionRef.current.stop(); setIsListening(false); if (lastResultRef.current) performCheck(lastResultRef.current); }, 400);
            };

            return (
                <div className="min-h-screen pb-20">
                    <nav className="bg-emerald-700 text-white p-4 shadow-lg sticky top-0 z-50">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <Icon name="Volume2" />
                                <h1 className="text-xl font-bold">車牌語音核對</h1>
                            </div>
                            <button onClick={fetchSheetData} className="p-2 active:scale-90"><Icon name="RefreshCw" className={isDbLoading ? "animate-spin" : ""} /></button>
                        </div>
                    </nav>

                    <main className="max-w-md mx-auto p-4 space-y-6">
                        {error && <div className="p-4 bg-rose-50 text-rose-600 rounded-2xl text-xs font-bold border border-rose-100">{error}</div>}

                        <div className="bg-white rounded-[2.5rem] shadow-xl p-8 flex flex-col items-center text-center">
                            <div className="mb-6 relative">
                                {isListening && <div className="absolute -inset-6 border-4 border-emerald-500/20 rounded-full animate-ping"></div>}
                                <button onMouseDown={handleStart} onMouseUp={handleEnd} onTouchStart={handleStart} onTouchEnd={handleEnd}
                                    className={`w-36 h-36 rounded-full flex items-center justify-center transition-all shadow-xl active:scale-95 ${isListening ? 'bg-emerald-500 text-white ring-8 ring-emerald-50' : 'bg-slate-50 text-slate-300'}`}
                                >
                                    <Icon name={isListening ? "Mic" : "MicOff"} size={64} />
                                </button>
                            </div>
                            <h2 className={`text-2xl font-black ${isListening ? 'text-emerald-600' : 'text-slate-600'}`}>{isListening ? "聆聽中..." : "長按說話"}</h2>
                            {transcript && <div className="mt-6 p-4 bg-slate-50 rounded-2xl w-full border-2 border-slate-100 font-mono text-3xl font-black">{recognizedPlate || '...'}</div>}
                        </div>

                        {matchData && !isListening && (
                            <div className={`p-6 rounded-[2.5rem] shadow-2xl text-white animate-in ${matchData.valid ? 'bg-emerald-600' : 'bg-amber-500'}`}>
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className="text-xs font-bold opacity-80 uppercase">{matchData.valid ? '已授權名單' : '警告：效期問題'}</p>
                                        <h2 className="text-5xl font-mono font-black">{matchData.number}</h2>
                                    </div>
                                    <div className="bg-white/20 p-4 rounded-3xl"><Icon name={matchData.valid ? "ShieldCheck" : "Clock"} size={40} /></div>
                                </div>
                                <div className="mt-4 p-4 bg-white/10 rounded-2xl border border-white/10 space-y-2">
                                    <p className="text-sm font-bold">備註：{matchData.note || '無'}</p>
                                    <div className="flex gap-4 text-[10px] opacity-80 font-mono">
                                        <span>起：{matchData.startDate || '--'}</span>
                                        <span>訖：{matchData.endDate || '--'}</span>
                                    </div>
                                </div>
                                <div className="mt-4 py-3 bg-white text-emerald-700 rounded-xl font-black text-center text-xl shadow-lg">
                                    {matchData.valid ? "✅ 准予進入" : `❌ ${matchData.reason}`}
                                </div>
                            </div>
                        )}

                        {matchData === null && recognizedPlate && !isListening && (
                            <div className="p-6 rounded-[2.5rem] shadow-2xl bg-rose-600 text-white animate-in">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-5xl font-mono font-black">{recognizedPlate}</h2>
                                    <Icon name="ShieldAlert" size={40} />
                                </div>
                                <div className="mt-6 py-4 bg-white text-rose-600 rounded-2xl font-black text-center text-xl uppercase">⚠️ 未在名單內</div>
                            </div>
                        )}
                    </main>
                    <footer className="fixed bottom-0 left-0 right-0 p-4 text-center text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                        Database: {plates.length} Records Loaded
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
