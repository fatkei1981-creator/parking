<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>粵語車牌語音核對系統 (結果優先)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .icon-box { min-width: 24px; min-height: 24px; display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQV-najIami6USTFBzxSpJ7jrxwRGoD4SdNimU4BgHjobS9GwYA-JlNXmVabaWVzBmRezYWrUDqYi4e/pub?output=csv";

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                const initIcon = () => {
                    if (window.lucide && iconRef.current) {
                        iconRef.current.innerHTML = `<i data-lucide="${name.toLowerCase()}" class="${className}" style="width:${size}px;height:${size}px"></i>`;
                        window.lucide.createIcons();
                    }
                };
                initIcon();
                const timer = setTimeout(initIcon, 300);
                return () => clearTimeout(timer);
            }, [name, size, className]);
            return <span ref={iconRef} className="icon-box"></span>;
        };

        function App() {
            const [plates, setPlates] = useState([]);
            const [isListening, setIsListening] = useState(false);
            const [transcript, setTranscript] = useState('');
            const [recognizedPlate, setRecognizedPlate] = useState('');
            const [matchData, setMatchData] = useState(null);
            const [error, setError] = useState('');
            const [isDbLoading, setIsDbLoading] = useState(false);

            const recognitionRef = useRef(null);
            const platesRef = useRef([]);
            const lastResultRef = useRef('');

            const weekdayNames = ["日", "一", "二", "三", "四", "五", "六"];

            const strictNormalize = (text) => {
                if (!text) return '';
                return text.toString().replace(/\s+/g, '').replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '').toUpperCase().trim();
            };

            const convertChineseNumerals = (text) => {
                const map = { '零': '0', '一': '1', '二': '2', '三': '3', '四': '4', '五': '5', '六': '6', '七': '7', '八': '8', '九': '9' };
                return text.split('').map(char => map[char] || char).join('');
            };

            const fetchSheetData = async () => {
                setIsDbLoading(true);
                try {
                    const response = await fetch(`${SPREADSHEET_CSV_URL}&t=${Date.now()}`);
                    if (!response.ok) throw new Error("讀取試算表失敗");
                    const csvText = await response.text();
                    const rows = csvText.split(/\r?\n/).slice(1);
                    const parsedData = rows.map(row => {
                        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        return {
                            number: cols[0]?.replace(/"/g, '').trim() || '',
                            note: cols[1]?.replace(/"/g, '').trim() || '',
                            startDate: cols[2]?.replace(/"/g, '').trim() || '',
                            endDate: cols[3]?.replace(/"/g, '').trim() || '',
                            allowedDays: cols[4]?.replace(/"/g, '').trim() || ''
                        };
                    }).filter(item => item.number !== '');
                    setPlates(parsedData);
                    platesRef.current = parsedData;
                } catch (err) {
                    setError("資料同步錯誤: " + err.message);
                } finally {
                    setIsDbLoading(false);
                }
            };

            const checkValidity = (data) => {
                const now = new Date();
                now.setHours(0, 0, 0, 0);
                const nowTs = now.getTime();
                const todayDay = new Date().getDay();

                if (data.startDate) {
                    const sDate = new Date(data.startDate);
                    sDate.setHours(0, 0, 0, 0);
                    if (!isNaN(sDate.getTime()) && nowTs < sDate.getTime()) return { valid: false, reason: '未到生效期' };
                }
                if (data.endDate) {
                    const eDate = new Date(data.endDate);
                    eDate.setHours(0, 0, 0, 0);
                    if (!isNaN(eDate.getTime()) && nowTs > eDate.getTime()) return { valid: false, reason: '許可已過期' };
                }

                if (data.allowedDays) {
                    const daysStr = data.allowedDays.toString();
                    const currentDayStr = todayDay.toString();
                    const checkDay = (str) => {
                        if (str.includes(currentDayStr)) return true;
                        if (str.includes(weekdayNames[todayDay])) return true;
                        return false;
                    };
                    if (!checkDay(daysStr)) return { valid: false, reason: `今日(週${weekdayNames[todayDay]})非允許泊車日` };
                }
                return { valid: true };
            };

            const performCheck = (val) => {
                const target = strictNormalize(convertChineseNumerals(val));
                if (!target) return;
                setRecognizedPlate(target);
                const found = platesRef.current.find(p => strictNormalize(p.number) === target);
                
                if (found) {
                    const status = checkValidity(found);
                    setMatchData({ ...found, ...status });
                } else {
                    setMatchData({ number: target, isUnknown: true });
                }
            };

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'zh-HK';
                    recognitionRef.current.onresult = (e) => {
                        let cur = '';
                        for (let i = e.resultIndex; i < e.results.length; ++i) cur += e.results[i][0].transcript;
                        setTranscript(cur);
                        lastResultRef.current = cur;
                        if (e.results[e.results.length - 1].isFinal || cur.length > 2) performCheck(cur);
                    };
                    recognitionRef.current.onend = () => setIsListening(false);
                    recognitionRef.current.onerror = (e) => { if (e.error !== 'aborted') setError(`語音錯誤: ${e.error}`); setIsListening(false); };
                }
                fetchSheetData();
            }, []);

            const handleStart = (e) => {
                if (e) e.preventDefault();
                setError(''); setTranscript(''); setRecognizedPlate(''); setMatchData(null);
                try { recognitionRef.current.start(); setIsListening(true); if (navigator.vibrate) navigator.vibrate(50); } catch(err){}
            };

            const handleEnd = (e) => {
                if (e) e.preventDefault();
                if (!isListening) return;
                setTimeout(() => { 
                    if (recognitionRef.current) recognitionRef.current.stop(); 
                    setIsListening(false); 
                    if (lastResultRef.current) performCheck(lastResultRef.current); 
                }, 400);
            };

            return (
                <div className="min-h-screen pb-24 bg-slate-50 text-slate-900">
                    <nav className="bg-slate-900 text-white p-4 shadow-xl sticky top-0 z-50">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <Icon name="ShieldCheck" className="text-emerald-400" />
                                <h1 className="text-lg font-bold tracking-tight">車牌權限核對系統</h1>
                            </div>
                            <button onClick={fetchSheetData} className="p-2 active:scale-90 bg-white/10 rounded-full transition-all">
                                <Icon name="RefreshCw" className={isDbLoading ? "animate-spin" : ""} />
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-md mx-auto p-4 space-y-6">
                        {/* 1. 核對結果 (現在移到了最上方) */}
                        <div className="min-h-[180px]">
                            {matchData && !isListening && (
                                <div className={`p-6 rounded-[2rem] shadow-2xl text-white animate-in ${matchData.isUnknown ? 'bg-rose-600' : (matchData.valid ? 'bg-emerald-600' : 'bg-amber-500')}`}>
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="text-[10px] font-bold opacity-80 uppercase tracking-widest mb-1">
                                                {matchData.isUnknown ? '核對結果：查無紀錄' : (matchData.valid ? '身分確認：准予進入' : '警告：限制進入')}
                                            </p>
                                            <h2 className="text-5xl font-mono font-black tracking-tighter">{matchData.number}</h2>
                                        </div>
                                        <div className="bg-white/20 p-4 rounded-3xl">
                                            <Icon name={matchData.isUnknown ? "ShieldAlert" : (matchData.valid ? "CheckCircle" : "Clock")} size={40} />
                                        </div>
                                    </div>
                                    
                                    {!matchData.isUnknown && (
                                        <div className="mt-4 p-4 bg-white/10 rounded-2xl border border-white/10 space-y-2">
                                            <div className="flex items-center gap-2 text-sm font-bold">
                                                <Icon name="FileText" size={14} /> 備註：{matchData.note || '無'}
                                            </div>
                                            <div className="grid grid-cols-1 gap-1 text-[10px] opacity-90 font-mono bg-black/10 p-2 rounded-lg">
                                                <div>許可期：{matchData.startDate || '不限'} 至 {matchData.endDate || '不限'}</div>
                                                <div className="border-t border-white/5 pt-1 mt-1">允許日：{matchData.allowedDays || '每天'}</div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="mt-6 py-4 bg-white text-slate-800 rounded-2xl font-black text-center text-2xl shadow-lg border-b-4 border-slate-200">
                                        {matchData.isUnknown ? (
                                            <span className="text-rose-600">⚠️ 未在名單內</span>
                                        ) : (
                                            matchData.valid ? (
                                                <span className="text-emerald-600">✅ 准予通行</span>
                                            ) : (
                                                <span className="text-amber-600">❌ {matchData.reason}</span>
                                            )
                                        )}
                                    </div>
                                </div>
                            )}
                            
                            {!matchData && !isListening && (
                                <div className="h-full border-2 border-dashed border-slate-200 rounded-[2rem] flex items-center justify-center text-slate-300 font-bold p-10 text-center">
                                    等待辨識車牌...
                                </div>
                            )}

                            {isListening && (
                                <div className="h-full bg-emerald-50 border-2 border-emerald-100 rounded-[2rem] flex flex-col items-center justify-center text-emerald-600 p-10 animate-pulse text-center">
                                    <Icon name="Activity" size={40} className="mb-2" />
                                    <span className="font-bold text-lg uppercase tracking-widest">正在聽取...</span>
                                </div>
                            )}
                        </div>

                        {/* 2. 操作按鈕 (置中顯示) */}
                        <div className="bg-white rounded-[2.5rem] shadow-xl p-8 flex flex-col items-center text-center border border-slate-100">
                            <div className="mb-4 relative">
                                {isListening && <div className="absolute -inset-6 border-4 border-emerald-500/20 rounded-full animate-ping"></div>}
                                <button onMouseDown={handleStart} onMouseUp={handleEnd} onTouchStart={handleStart} onTouchEnd={handleEnd}
                                    className={`w-36 h-36 rounded-full flex items-center justify-center transition-all shadow-xl active:scale-95 touch-none ${isListening ? 'bg-emerald-500 text-white ring-8 ring-emerald-50' : 'bg-slate-100 text-slate-400'}`}
                                >
                                    <Icon name={isListening ? "Mic" : "MicOff"} size={64} />
                                </button>
                            </div>
                            <h2 className={`text-xl font-black ${isListening ? 'text-emerald-600' : 'text-slate-500'}`}>{isListening ? "請讀出車牌" : "長按進行辨識"}</h2>
                            <p className="text-[10px] text-slate-300 mt-1 uppercase tracking-widest font-bold">Supported Cantonese & English</p>
                        </div>
                    </main>
                    
                    <footer className="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md text-center text-[10px] text-slate-400 font-bold border-t">
                        <div className="max-w-md mx-auto flex justify-between items-center opacity-70 px-2">
                            <span>今日：週{weekdayNames[new Date().getDay()]}</span>
                            <span className="bg-slate-200 text-slate-500 px-2 py-0.5 rounded-full tracking-tighter">DATA: {plates.length} RECORDS</span>
                        </div>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
