<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>粵語車牌語音核對系統 (簡化資訊版)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .mic-ripple { animation: ripple 1.5s infinite; }
        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 25px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQV-najIami6USTFBzxSpJ7jrxwRGoD4SdNimU4BgHjobS9GwYA-JlNXmVabaWVzBmRezYWrUDqYi4e/pub?output=csv";

        const LucideSVG = ({ name, size = 24, className = "" }) => {
            const icons = {
                shieldcheck: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zM12 8v4m0 4h.01" />,
                refreshcw: <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8m0-5v5h-5" />,
                mic: <><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" x2="12" y1="19" y2="22"/></>,
                micoff: <><line x1="1" x2="23" y1="1" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V5a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 11v-1"/><path d="M23 19v2"/><line x1="12" x2="12" y1="19" y2="22"/></>,
                shieldalert: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>,
                checkcircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
                clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                filetext: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></>,
                search: <><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></>,
                activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            };

            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name.toLowerCase()] || null}
                </svg>
            );
        };

        function App() {
            const [plates, setPlates] = useState([]);
            const [isListening, setIsListening] = useState(false);
            const [matchData, setMatchData] = useState(null);
            const [isDbLoading, setIsDbLoading] = useState(false);

            const recognitionRef = useRef(null);
            const platesRef = useRef([]);
            const lastResultRef = useRef('');

            const weekdayNames = ["日", "一", "二", "三", "四", "五", "六"];

            const strictNormalize = (text) => {
                if (!text) return '';
                return text.toString().replace(/\s+/g, '').replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '').toUpperCase().trim();
            };

            const convertChineseNumerals = (text) => {
                const map = { '零': '0', '一': '1', '二': '2', '三': '3', '四': '4', '五': '5', '六': '6', '七': '7', '八': '8', '九': '9' };
                return text.split('').map(char => map[char] || char).join('');
            };

            const fetchSheetData = async () => {
                setIsDbLoading(true);
                try {
                    const response = await fetch(`${SPREADSHEET_CSV_URL}&t=${Date.now()}`);
                    const csvText = await response.text();
                    const rows = csvText.split(/\r?\n/).slice(1);
                    const parsedData = rows.map(row => {
                        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        return {
                            number: cols[0]?.replace(/"/g, '').trim() || '',
                            note: cols[1]?.replace(/"/g, '').trim() || '',
                            startDate: cols[2]?.replace(/"/g, '').trim() || '',
                            endDate: cols[3]?.replace(/"/g, '').trim() || '',
                            allowedDays: cols[4]?.replace(/"/g, '').trim() || ''
                        };
                    }).filter(item => item.number !== '');
                    setPlates(parsedData);
                    platesRef.current = parsedData;
                } catch (err) {
                    console.error("Fetch error", err);
                } finally {
                    setIsDbLoading(false);
                }
            };

            const checkValidity = (data) => {
                const now = new Date();
                now.setHours(0, 0, 0, 0);
                const todayDay = now.getDay();

                if (data.startDate && now < new Date(data.startDate)) return { valid: false, reason: '未到生效期' };
                if (data.endDate && now > new Date(data.endDate)) return { valid: false, reason: '許可已過期' };
                
                if (data.allowedDays) {
                    const daysStr = data.allowedDays.toString();
                    if (!daysStr.includes(todayDay.toString()) && !daysStr.includes(weekdayNames[todayDay])) {
                        return { valid: false, reason: `今日(週${weekdayNames[todayDay]})非允許泊車日` };
                    }
                }
                return { valid: true };
            };

            const performCheck = (val) => {
                const target = strictNormalize(convertChineseNumerals(val));
                if (!target) return;
                const found = platesRef.current.find(p => strictNormalize(p.number) === target);
                if (found) {
                    const status = checkValidity(found);
                    setMatchData({ ...found, ...status });
                } else {
                    setMatchData({ number: target, isUnknown: true });
                }
            };

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'zh-HK';
                    recognitionRef.current.onresult = (e) => {
                        let cur = '';
                        for (let i = e.resultIndex; i < e.results.length; ++i) cur += e.results[i][0].transcript;
                        lastResultRef.current = cur;
                        if (e.results[e.results.length - 1].isFinal || cur.length > 2) performCheck(cur);
                    };
                    recognitionRef.current.onend = () => setIsListening(false);
                }
                fetchSheetData();
            }, []);

            const handleStart = (e) => {
                if (e) e.preventDefault();
                setMatchData(null);
                try { recognitionRef.current.start(); setIsListening(true); if (navigator.vibrate) navigator.vibrate(50); } catch(err){}
            };

            const handleEnd = (e) => {
                if (e) e.preventDefault();
                if (!isListening) return;
                setTimeout(() => { 
                    if (recognitionRef.current) recognitionRef.current.stop(); 
                    setIsListening(false); 
                    if (lastResultRef.current) performCheck(lastResultRef.current); 
                }, 400);
            };

            return (
                <div className="min-h-screen pb-24 bg-slate-50">
                    <nav className="bg-slate-900 text-white p-4 shadow-xl sticky top-0 z-50">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <LucideSVG name="shieldcheck" className="text-emerald-400" />
                                <h1 className="text-lg font-bold">車牌權限核對系統</h1>
                            </div>
                            <button onClick={fetchSheetData} className="p-2 active:scale-90 bg-white/10 rounded-full transition-all">
                                <LucideSVG name="refreshcw" className={isDbLoading ? "animate-spin" : ""} />
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-md mx-auto p-4 space-y-4">
                        <div className="min-h-[220px]">
                            {matchData && !isListening && (
                                <div className={`p-6 rounded-[2.5rem] shadow-2xl text-white animate-in ${matchData.isUnknown ? 'bg-rose-600' : (matchData.valid ? 'bg-emerald-600' : 'bg-amber-500')}`}>
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="text-[20px] font-bold opacity-80 uppercase tracking-widest mb-1">
                                                {matchData.isUnknown ? '核對結果：查無紀錄' : (matchData.valid ? '身分確認：准予進入' : '警告：限制進入')}
                                            </p>
                                            <h2 className="text-5xl font-mono font-black tracking-tighter">{matchData.number}</h2>
                                        </div>
                                        <div className="bg-white/20 p-4 rounded-3xl">
                                            <LucideSVG name={matchData.isUnknown ? "shieldalert" : (matchData.valid ? "checkcircle" : "clock")} size={40} />
                                        </div>
                                    </div>
                                    
                                    {!matchData.isUnknown && (
                                        <div className="mt-4 space-y-2 bg-white/10 p-4 rounded-2xl border border-white/10">
                                            <div className="flex items-start gap-2">
                                                <LucideSVG name="filetext" size={16} className="mt-0.5 opacity-80" />
                                                <div className="text-sm">
                                                    <span className="font-bold block text-[10px] opacity-70 uppercase">備註資訊</span>
                                                    {matchData.note || '無備註'}
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-2 pt-2 border-t border-white/10">
                                                <div>
                                                    <span className="font-bold block text-[10px] opacity-70 uppercase">生效日期</span>
                                                    <span className="text-xs font-mono">{matchData.startDate || '不限'}</span>
                                                </div>
                                                <div>
                                                    <span className="font-bold block text-[10px] opacity-70 uppercase">到期日期</span>
                                                    <span className="text-xs font-mono">{matchData.endDate || '不限'}</span>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="mt-6 py-4 bg-white text-slate-800 rounded-2xl font-black text-center text-2xl shadow-inner">
                                        {matchData.isUnknown ? "⚠️ 未在名單內" : (matchData.valid ? "✅ 准予通行" : `❌ ${matchData.reason}`)}
                                    </div>
                                </div>
                            )}
                            
                            {!matchData && !isListening && (
                                <div className="h-44 border-2 border-dashed border-slate-200 rounded-[2.5rem] flex flex-col items-center justify-center text-slate-300 font-bold p-8 text-center bg-white/50">
                                    <LucideSVG name="search" size={32} className="mb-2 opacity-20" />
                                    等待辨識車牌...
                                </div>
                            )}

                            {isListening && (
                                <div className="h-44 bg-emerald-50 border-2 border-emerald-100 rounded-[2.5rem] flex flex-col items-center justify-center text-emerald-600 p-8 animate-pulse text-center">
                                    <LucideSVG name="activity" size={40} className="mb-2" />
                                    <span className="font-black text-xl uppercase tracking-widest">正在聽取語音...</span>
                                </div>
                            )}
                        </div>

                        <div className="flex flex-col items-center py-6">
                            <div className="relative">
                                {isListening && (
                                    <div className="absolute inset-0 bg-emerald-500/20 rounded-full mic-ripple scale-125"></div>
                                )}
                                
                                <button 
                                    onMouseDown={handleStart} 
                                    onMouseUp={handleEnd} 
                                    onTouchStart={handleStart} 
                                    onTouchEnd={handleEnd}
                                    className={`relative z-10 w-44 h-44 rounded-full flex flex-col items-center justify-center transition-all duration-300 shadow-2xl active:scale-95 touch-none border-8 ${
                                        isListening 
                                        ? 'bg-emerald-500 border-emerald-100 text-white' 
                                        : 'bg-white border-slate-50'
                                    }`}
                                >
                                    <LucideSVG 
                                        name={isListening ? "mic" : "micoff"} 
                                        size={72} 
                                        className={isListening ? "text-white" : "text-rose-500"} 
                                    />
                                    <span className={`mt-2 text-[10px] font-bold uppercase tracking-widest ${isListening ? 'text-emerald-100' : 'text-rose-400'}`}>
                                        {isListening ? "Listening" : "Hold Mic"}
                                    </span>
                                </button>
                            </div>
                            
                            <div className="mt-8 text-center space-y-1">
                                <p className={`text-lg font-black transition-colors ${isListening ? 'text-emerald-600' : 'text-slate-500'}`}>
                                    {isListening ? "請讀出車牌號碼" : "長按進行語音辨識"}
                                </p>
                            </div>
                        </div>
                    </main>
                    
                    <footer className="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md text-center text-[10px] text-slate-400 font-bold border-t">
                        <div className="max-w-md mx-auto flex justify-between items-center opacity-70 px-2">
                            <span>今日：週{weekdayNames[new Date().getDay()]}</span>
                            <span className="bg-slate-200 text-slate-600 px-3 py-1 rounded-full">{plates.length} 筆資料</span>
                        </div>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
